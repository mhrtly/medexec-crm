    <script>
      // Polyfill localStorage/sessionStorage for sandboxed iframes
      (function(){
        try{var t=window.localStorage;t.setItem('_t','1');t.removeItem('_t')}catch(e){
          var m={};
          var s={getItem:function(k){return m[k]||null},setItem:function(k,v){m[k]=String(v)},removeItem:function(k){delete m[k]},clear:function(){m={}},get length(){return Object.keys(m).length},key:function(i){return Object.keys(m)[i]||null}};
          try{Object.defineProperty(window,'localStorage',{value:s,writable:false,configurable:true})}catch(e2){}
          try{Object.defineProperty(window,'sessionStorage',{value:s,writable:false,configurable:true})}catch(e3){}
        }
      })();
    </script>
